name: quiz_app
description: "GK Quiz App – Daily trivia monetized with AdMob. Target: ₹1000/month."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management, routing, DI
  get: ^4.6.6

  # Google Mobile Ads (AdMob)
  google_mobile_ads: ^5.3.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3

  # Local storage
  shared_preferences: ^2.3.2

  # UI & Sharing
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  share_plus: ^10.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/data/questions.json
